name: nlp641
channels:
  - pytorch
  - huggingface
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip

  # Core scientific computing
  - numpy>=2.2.0
  - pandas>=2.2.0
  - scipy>=1.14.0
  - matplotlib>=3.9.0
  - seaborn>=0.13.0
  - plotly>=5.0.0

  # Jupyter ecosystem
  - jupyter>=1.1.0
  - jupyterlab>=4.4.0
  - notebook>=7.4.0
  - ipywidgets>=8.1.0
  - nbconvert>=7.16.0

  # Machine Learning
  - scikit-learn>=1.5.0
  - pytorch>=2.1.0
  - torchvision
  - torchaudio

  # Utilities
  - tqdm>=4.67.0
  - pyyaml>=6.0.0
  - requests>=2.32.0
  - python-dateutil>=2.9.0

  # Knowledge Graph & Semantic Web
  - sparqlwrapper>=2.0.0
  - rdflib>=7.1.0

  # ANN / IR backends
  - faiss-cpu>=1.7.4
  - hnswlib>=0.7.0

  # pip-only packages
  - pip:
    - transformers>=4.40.0
    - accelerate>=0.30.0
    - sentence-transformers>=2.6.0
    - datasets>=1.15.0
    - tokenizers>=0.10.0
    - sentencepiece>=0.1.96
    - spacy>=3.7.0
    - nltk>=3.9.0
    - gensim>=4.1.0
    - beautifulsoup4>=4.13.0
    - regex>=2021.8.28
    - textstat>=0.7.0
    - wordcloud>=1.8.0
    - langdetect>=1.0.9
    - jsonlines>=2.0.0
    - openpyxl>=3.0.8
    - networkx>=3.4.0
    - python-dotenv>=0.19.0
    - jupyter-contrib-nbextensions>=0.5.0
    - wikipedia-api>=0.8.0

