name: nlp641
channels:
  - pytorch
  - huggingface
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  
  # Core scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  - plotly>=5.0.0
  
  # Jupyter ecosystem
  - jupyter>=1.0.0
  - jupyterlab>=3.0.0
  - notebook>=6.4.0
